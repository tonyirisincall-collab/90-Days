{day:31,tag:'performance',title:'مبدأ الـ Personalization',story:'Agent بدأ يستخدم اسم الكلايت 3 مرات في المكالمة بشكل طبيعي. بعد شهر، الـ Customer Satisfaction Score بتاعه ارتفع بشكل واضح. حاجة صغيرة — تأثير كبير.',moral:'الاسم هو أحلى كلمة للإنسان. استخدمه بصدق.',goal:'هدف اليوم: في كل مكالمة، استخدم اسم الكلايت 2-3 مرات بشكل طبيعي.'},
{day:32,tag:'mindset',title:'مبدأ الـ Ownership',story:'كلايت اتصل بمشكلة. الـ agent الأول قاله "مش قسمي". الـ agent التاني قال "أنا هتابع معك لحد ما تتحل". الكلايت رجع لنفس الشركة بعد المشكلة لأن واحد "أخد ملكية" المشكلة.',moral:'خد ملكية مشاكل الكلايت حتى لو الحل في قسم تاني.',goal:'هدف اليوم: في كل مشكلة، قول "أنا هتابع" بدل "مش قسمي".'},
{day:33,tag:'communication',title:'مهارة الـ Summarizing',story:'في نهاية كل محادثة، agent بدأ يلخص: "بالتالي اتفقنا على... وهيحصل في... صح؟" الكلايت بيبقى متأكد والـ agent بيبقى متأكد — مفيش سوء فهم.',moral:'التلخيص بيمنع سوء الفهم ويحمي الاتنين.',goal:'هدف اليوم: خلص كل محادثة بتلخيص سريع لما اتفقوا عليه.'},
{day:34,tag:'mindset',title:'قوة الـ Visualization',story:'رياضيون أوليمبيون بيتخيلوا الأداء المثالي قبل المنافسة. Agent بدأ يتخيل كل مكالمة ناجحة قبل ما يردّ. بعد شهر، الـ confidence بتاعه اتغيرت بشكل ملحوظ.',moral:'العقل ما بيفرقش بين ما تتخيله وما بيحصل فعلاً بشكل كامل. الـ visualization بيحضّرك.',goal:'هدف اليوم: قبل ما تبدأ شيفت، تخيل 3 مكالمات ناجحة في دماغك.'},
{day:35,tag:'performance',title:'مبدأ الـ Handle Time vs Quality',story:'فيه توازن لازم يتحقق: مش سريع جداً فالجودة بتتضار، ومش بطيء جداً فالـ Queue بيتراكم. أفضل الـ agents بيعرفوا يحلوا "بشكل كامل وبوقت معقول".',moral:'السرعة والجودة مش ضدين — الاتنين ممكن مع بعض بالتدريب.',goal:'هدف اليوم: ارسم لنفسك تعريف واضح لـ "مكالمة ناجحة في وقت معقول".'},
{day:36,tag:'communication',title:'التعامل مع الكلايت الصامت',story:'مش كل الكلاينتس بيعبروا عن مشاعرهم. Agent اتعلم إن الصمت أنواع: صمت تفكير، صمت غضب، صمت ارتباك. وبدأ يتعامل مع كل نوع بأسلوب مختلف.',moral:'الصمت له معاني — تعلم تقرأه.',goal:'هدف اليوم: لما كلايت يسكت، قول: "تمام، خدلك وقتك — أنا هنا."'},
{day:37,tag:'mindset',title:'مبدأ الـ Beginner\'s Mind في التعلم',story:'Agent بخبرة 3 سنين حضر تدريب زي الـ juniors. بدل ما يقول "أنا عارف ده"، جلس يسمع. اكتشف 3 techniques جديدة ما كانش يعرفها.',moral:'الخبرة نعمة لما بتخليك تتعلم أعمق. مشكلة لما بتخليك تحس إنك عارف كل حاجة.',goal:'هدف اليوم: في أي تدريب أو نقاش، ادخل بعقل المبتدئ.'},
{day:38,tag:'performance',title:'مبدأ الـ Proactive Communication',story:'Agent لاحظ إن كلايت فيه تأخير في طلبه. بدل ما يستنى الكلايت يتصل، اتصل هو أول وأخبره بالوضع وبالـ Expected Time. الكلايت بدل ما يزعل — شكره.',moral:'الاتصال الاستباقي يمنع الشكاوى ويبني ثقة.',goal:'هدف اليوم: لو فيه كلايت هيأخر عليه حاجة، بادر وكلمه أنت الأول.'},
{day:39,tag:'communication',title:'مهارة طرح الأسئلة الصح',story:'فرق بين "هل عندك مشكلة تانية؟" و"إيه التاني ممكن أساعد فيه النهارده؟" السؤال الأول closed, التاني open. الكلايت بيكشف أكتر مع الـ Open Questions.',moral:'الأسئلة المفتوحة بتفتح محادثات. المغلقة بتقفلها.',goal:'هدف اليوم: في كل محادثة، استخدم سؤال مفتوح واحد على الأقل.'},
{day:40,tag:'mindset',title:'مبدأ الـ Intrinsic Motivation',story:'دراسة لاقت إن الناس اللي بتشتغل لأنهم "بيحبوا الشغل" بتأدي بشكل أفضل من اللي بيشتغلوا بس "عشان الراتب". الدافع الداخلي بيتولد لما بتحس بمعنى.',moral:'ابحث عن المعنى في شغلك — مش بس ابحث عن المكافأة.',goal:'هدف اليوم: اكتب 3 أسباب بتجعلك فخور بشغلك.'},
{day:41,tag:'performance',title:'مهارة الـ Upselling الأخلاقي',story:'Upselling مش لازم يكون بيع قسري. Agent اتعلم يسأل: "بناءً على اللي قلته، عندنا خدمة بتوفر عليك كدا..." وبيقدم القيمة الحقيقية مش بيبيع. التحويلات ارتفعت لأن الكلايت حس بنصيحة مش بيع.',moral:'Upselling الصح هو حين بتقدم قيمة حقيقية. الكلايت بيحس الفرق.',goal:'هدف اليوم: لو عندك فرصة upsell، فكر: "ده بيفيد الكلايت فعلاً؟" أول.'},
{day:42,tag:'culture',title:'مبدأ الـ Peer Learning',story:'التيم الأعلى أداءً في أي شركة بيتعلموا من بعض. Agent بدأ يسأل أعلى زميل أداء: "إيه اللي بتعمله مختلف؟" وبيطبق واحدة منها في الأسبوع.',moral:'المعلمين الأفضل أحياناً بيبقوا جنبك في نفس القاعة.',goal:'هدف اليوم: سأل أحسن agent في تيمك حاجة واحدة بيعملها مختلف.'},
{day:43,tag:'mindset',title:'مبدأ الـ Radical Acceptance',story:'Marsha Linehan طورت مبدأ القبول الجذري: بعض الحاجات في الشغل هتبقى صعبة دايماً. قبول ده مش استسلام — هو تحرر من الغضب على حاجات ما بتتغيرش.',moral:'الغضب من اللي مش في إيدك بيحرق طاقتك. القبول بيوفر الطاقة للي في إيدك.',goal:'هدف اليوم: حدد حاجة في الشغل صعبة ومش في إيدك — وقرر تتعايش معها بدل ما تحاربها.'},
{day:44,tag:'performance',title:'مبدأ الـ After Call Work — ACW',story:'الـ ACW اللي بيتعمل بعد الكالز مهم زي الكالز نفسه. Agent اتعلم يعمله بسرعة ودقة: ملاحظات واضحة، الحل المتخد، والـ follow-up المطلوب. ده وفّر وقت لنفسه وللتيم.',moral:'الـ documentation مش بيروقراطية — هي رسالة لنفسك في المستقبل.',goal:'هدف اليوم: حسّن الـ notes اللي بتكتبها بعد كل مكالمة — خليها واضحة ومفيدة.'},
{day:45,tag:'mindset',title:'منتصف الرحلة للـ Agent',story:'في كأس العالم، الإحصاءات بتقول إن أكتر الأهداف بتتسجل في الـ 15 دقيقة الأخيرة — لأن الفرق اللي بتعرف تحافظ على الطاقة بيفوز. إنت في المنتصف — ازاي طاقتك؟',moral:'القدرة على الاستمرار بنفس الجودة مش موهبة — عادة بتتبنى.',goal:'هدف اليوم: قيّم طاقتك الآن: هل شغّال بنفس جودة أول يوم؟ وإيه اللي محتاجه؟'},
{day:46,tag:'communication',title:'مهارة التعامل مع الرفض',story:'Sales agent سمع "لأ" مئة مرة. بدل ما يتأثر، سأل نفسه: "مش لأ لي — لأ للعرض ده في الوقت ده." وبدأ يسأل: "إيه اللي كان هيخليك تفكر؟" بدأ يتعلم ويتحسن.',moral:'الرفض معلومة، مش حكم عليك.',goal:'هدف اليوم: لو أي كلايت رفض، اسأل بهدوء: "إيه اللي كان هيفرق في قرارك؟"'},
{day:47,tag:'mindset',title:'قوة الـ Habits',story:'William James قال إن 95% من أفعالنا اليومية عادات. Agent بنى عادات صغيرة: يراجع الـ script الصبح، ياخد نفس قبل كل مكالمة صعبة، يكتب ملاحظة واحدة بعد كل يوم. بعد شهر، الأداء اتحسن أوتوماتيك.',moral:'الـ habits بتشغّل نفسها. ابنِ العادات الصح وهي هتعمل الشغل.',goal:'هدف اليوم: حدد عادة مهنية واحدة عايز تبنيها وابدأ بيها النهارده.'},
{day:48,tag:'performance',title:'مبدأ الـ Feedback Loop',story:'Agent طلب من التيم ليدر بتاعه يسمع مكالمة واحدة أسبوعياً ويدي ملاحظة. في 2 شهر، تطور بشكل لاحقه الكل.',moral:'الـ feedback المنتظم هو أسرع طريق للتطور. اطلبه مش بس استنى.',goal:'هدف اليوم: اطلب من مشرفك feedback على حاجة واحدة محددة.'},
{day:49,tag:'communication',title:'مهارة الـ Pacing',story:'Pacing يعني إنك تتكيف مع إيقاع الشخص اللي بتتكلمه. الكلايت البطيء في الكلام محتاج agent ببطء وهدوء. الكلايت السريع محتاج agent يكون على نفس الإيقاع.',moral:'التكيف مع إيقاع الكلايت بيخليه يحس إنك "بتفهمه". ده بيبني rapport سريع.',goal:'هدف اليوم: لاحظ إيقاع كلام كل كلايت وحاول تتكيف معه.'},
{day:50,tag:'mindset',title:'مبدأ الـ Long-term Thinking',story:'Agent شاف شغله كـ "مسار" مش "وظيفة". بدأ يسأل: "إيه اللي هتعلمه من الشغل ده ينفعني في 5 سنين؟" الـ mindset ده خلاه يستغل كل فرصة تدريب وكل محادثة صعبة.',moral:'كل مكالمة هي تدريب. كل تحدي هو فرصة. كل يوم هو استثمار.',goal:'هدف اليوم: فكر في مهارة واحدة هتتعلمها من شغلك النهارده تنفعك في مستقبلك.'},
{day:51,tag:'performance',title:'مهارة الـ Error Recovery',story:'الفرق بين الـ agent المبتدئ والمحترف مش إن المحترف ما بيغلطش — هو إنه بيتعافى بسرعة من الغلطة في وسط المكالمة. بيعترف، بيعتذر، وبيكمل بثقة.',moral:'الغلطة في المكالمة مش نهاية — طريقة تعافيك منها هي اللي بتحدد النتيجة.',goal:'هدف اليوم: لو غلطت في مكالمة، اعترف فوراً وكمّل بثقة.'},
{day:52,tag:'communication',title:'مهارة قراءة الـ Emotional Cues',story:'Agent اتعلم يسمع مش بس الكلام — يسمع النبرة والسرعة والصمت. كلايت بيتكلم سريع ومتوتر = ضاغط عليه. كلايت بيتكلم ببطء وبصوت خافت = حزين أو محبط.',moral:'80% من التواصل مش في الكلام. اسمع ما بين الكلمات.',goal:'هدف اليوم: في محادثة، ركّز على النبرة مش بس المحتوى وحدد حالة الكلايت العاطفية.'},
{day:53,tag:'mindset',title:'مبدأ الـ Incremental Confidence',story:'Confidence مش بتيجي من فراغ. بتيجي من تجميع "إثباتات" إنك تقدر. كل مكالمة صعبة اتجاوزتها هي إثبات. كل كلايت راضي هو إثبات. بنِ ملف الإثباتات ده في دماغك.',moral:'ذاكرتك مع الإنجازات أقوى من ذاكرتك مع الفشل. ابنِ الاتنين عمداً.',goal:'هدف اليوم: اكتب 3 مواقف نجحت فيها في الشغل وافتكر الإحساس.'},
{day:54,tag:'performance',title:'مبدأ الـ Benchmarking الشخصي',story:'بدل مقارنة نفسه بزميله، agent بدأ يقارن نفسه بـ "نفسه الأسبوع اللي فات". سأل: "بعت أكتر؟ وقت التعامل أقل؟ رضا أعلى؟" التحسين بقى شخصي ومحدد.',moral:'أفضل منافسة هي مع نفسك أمس.',goal:'هدف اليوم: قارن أداؤك النهارده بأداؤك الأسبوع اللي فات في حاجة محددة.'},
{day:55,tag:'communication',title:'مهارة الـ Chunking في الشرح',story:'كلايت سأل عن عملية معقدة. Agent حسس الإرهاق لما شرح كل حاجة مرة واحدة. اتعلم يشرح في 3 chunks: "الجزء الأول هو... واضح؟ تمام، الجزء التاني..."',moral:'المعلومة الكتير دفعة واحدة مش بتتذكر. قسّم وتأكد.',goal:'هدف اليوم: لو في شرح معقد، قسّمه لـ 3 أجزاء وتأكد بعد كل جزء.'},
{day:56,tag:'mindset',title:'مبدأ الـ Mindful Responding',story:'Victor Frankl قال: "بين المحفز والاستجابة فيه مساحة". الـ agent المحترف بياخد لحظة صغيرة قبل الرد، حتى لو ثانية واحدة، عشان يختار الرد مش يتفاعل.',moral:'الرد المختار دايماً أفضل من الرد التلقائي.',goal:'هدف اليوم: قبل كل رد مهم، خد نفس واحد وارد باختيار.'},
{day:57,tag:'performance',title:'مبدأ الـ Solution First',story:'Agent اتعلم إنه يعرض الحل أول قبل الشرح. بدل "المشكلة بسبب كذا وكذا وكذا لذلك..."، قال "الحل هو كذا — عايزني أشرح ليه؟" الكلايت بقى أكثر تقبلاً.',moral:'الناس بتريد الحل أول. الشرح بعدين لو طلبوه.',goal:'هدف اليوم: في كل مشكلة، ابدأ بالحل وبعدين اشرح لو الكلايت سأل.'},
{day:58,tag:'communication',title:'مهارة الـ Vocal Variety',story:'Agent اتعلم إن صوت monotone (على نغمة واحدة) بيخلي الكلايت يحس بعدم الاهتمام. بدأ يغير: سرعة، نبرة، حماس في أماكن معينة. الـ engagement ارتفع.',moral:'صوتك أداة — استخدم تنوعه.',goal:'هدف اليوم: سجّل مكالمة وراجع: هل صوتك فيه تنوع ولا على نغمة واحدة؟'},
{day:59,tag:'mindset',title:'مبدأ الـ Identity-Based Change',story:'James Clear بيقول التغيير الحقيقي مش بيبدأ من "عايز أعمل كدا" — بيبدأ من "أنا الشخص اللي بيعمل كدا". Agent قرر يقول لنفسه "أنا agent محترف" قبل ما يبدأ الشيفت.',moral:'هويتك بتحدد أفعالك. قرر مين إنت أول، والأفعال هتتبع.',goal:'هدف اليوم: اكتب جملة واحدة عن هويتك المهنية — "أنا agent اللي..."'},
{day:60,tag:'culture',title:'نهاية الشهرين للـ Agent',story:'في الغوص، هناك مبدأ اسمه "Turn Around Rule" — لما تستهلك نص الأكسجين، ارجع. ده مش فشل — ده حكمة. في الشغل: اعرف متى تطلب مساعدة.',moral:'الـ agent الواعي يعرف حدوده ويطلب مساعدة في الوقت الصح.',goal:'هدف اليوم: حدد حاجة تحتاج فيها دعم من تيمك أو مشرفك — واطلبه.'},
],
ag3:[
{day:61,tag:'performance',title:'مبدأ الـ Pattern Recognition',story:'Agent بعد 60 يوم بدأ يلاحظ patterns: نوع معين من الكلاينتس بيشتكي من نفس الحاجة، وقت معين في اليوم بيجي فيه ضغط. استخدم الـ patterns دي يجهز نفسه.',moral:'الخبرة = التعرف على الـ patterns. استخدمها.',goal:'هدف اليوم: حدد pattern واحد في شغلك وفكر في إيه اللي تعمله مختلف بسببه.'},
{day:62,tag:'communication',title:'مهارة الـ Transition Language',story:'انتقال محادثة من موضوع لتاني من غير transition بيعمل confusion. Agent اتعلم جمل زي: "بناءً على ما قلته، خليني أسألك عن..." أو "قبل ما نكمل، عايز أتأكد من..."',moral:'الـ transitions الكلامية بتخلي المحادثة منظمة وسهلة للطرفين.',goal:'هدف اليوم: تعلم جملتين transition وجربهم النهارده.'},
{day:63,tag:'mindset',title:'مبدأ الـ Equanimity',story:'Marcus Aurelius كتب في Meditations عن "الاتزان" — القدرة على البقاء ثابت سواء جاءت أخبار جيدة أو سيئة. الـ Agent الأكتر اتزاناً هو الأكتر ثقة.',moral:'الاتزان مش لامبالاة — هو قدرة على الاستمرار بنفس الجودة بغض النظر عن الظروف.',goal:'هدف اليوم: لاحظ لحظة فقدت فيها الاتزان النهارده وفكر: كان ممكن أتعامل معها إزاي؟'},
{day:64,tag:'performance',title:'مبدأ الـ First Impression Effect',story:'دراسة لاقت إن الناس بتكوّن رأي في أول 7 ثواني. في المكالمات الصوتية، الصوت والأسلوب في أول 10 ثواني بيحدد مزاج المحادثة كلها.',moral:'الأول 10 ثواني = 60% من نجاح المكالمة. استثمر فيهم.',goal:'هدف اليوم: راجع فتح مكالمتك وحسّنه في حاجة واحدة.'},
{day:65,tag:'communication',title:'مهارة الـ Back-Channeling',story:'"آه"، "تمام"، "أيوه" — دي Back Channels. بتقول للمتكلم "أنا مصحيك". لما بتكون على التليفون وبتسكت تماماً، الكلايت بيشك إنك معاه أصلاً.',moral:'الإشارات الصوتية الصغيرة بتقول "أنا هنا" بدون ما تقاطع.',goal:'هدف اليوم: استخدم Back Channels بشكل طبيعي في كل محادثة.'},
{day:66,tag:'mindset',title:'قوة الـ Deliberate Rest',story:'Anders Ericsson لاحظ إن أفضل المحترفين بيشتغلوا 4-5 ساعات تركيز عالي وبعدين بياخدوا استراحة حقيقية. مش بيشتغلوا 12 ساعة "عادية".',moral:'الراحة المتعمدة جزء من الأداء العالي مش ضده.',goal:'هدف اليوم: خد استراحة حقيقية (من غير موبايل) بين الشيفتات.'},
{day:67,tag:'performance',title:'مبدأ الـ Voice of the Customer',story:'أكبر فرصة تطوير في أي شركة مخبّاة في كلام الكلاينتس. Agent بدأ يسجّل ملاحظات عن أكتر الشكاوى المتكررة وبعتها للتيم ليدر. الـ feedback ده غيّر policy.',moral:'إنت أقرب حد للكلايت — صوتك بيمثلهم. ابعت الـ insights.',goal:'هدف اليوم: لو كلايت قال حاجة ممكن تتحسن، سجّلها وشاركها مع التيم ليدر.'},
{day:68,tag:'communication',title:'مهارة الـ Hedging Language',story:'"سيتم" أو "من المحتمل" أو "في الغالب" — دي Hedging Language. بتقيّد الوعود وتمنع توقعات زيادة عن اللازم. Agent اتعلم الفرق بين "هيوصل بكرة" (وعد) و"المتوقع خلال 24-48 ساعة" (تحفظ).',moral:'الدقة في الكلام تحميك وتحمي الكلايت من خيبة الأمل.',goal:'هدف اليوم: راجع الوعود اللي بتديها ودقّقها بحيث تكون قادر تفي بيها.'},
{day:69,tag:'mindset',title:'مبدأ الـ Introspection',story:'Socrates قال "الحياة غير المفحوصة لا تستحق أن تُعاش". Agent بدأ يكتب كل أسبوع: "إيه اللي عملته كويس؟ إيه اللي هحسّنه؟ إيه اللي اتعلمته؟" التطور بقى مقصود.',moral:'التأمل المنتظم هو فرق بين اللي بيتطور واللي بيكرر نفس السنة 20 مرة.',goal:'هدف اليوم: اكتب إجابة على الـ 3 أسئلة دول عن أسبوعك.'},
{day:70,tag:'performance',title:'مبدأ الـ Error Tracking',story:'Agent بدأ يتتبع أخطاؤه في دفتر: نوع الغلطة، السبب، والحل. بعد شهر، لاحظ إن 80% من أخطائه من نوعين فقط. ركّز عليهم وأخطاؤه نقصت بشكل ضخم.',moral:'الـ patterns في الأخطاء هي الطريق الأسرع للتطور.',goal:'هدف اليوم: ابدأ تتتبع أخطاءك في نوع محدد وابحث عن الـ pattern.'},
{day:71,tag:'communication',title:'مهارة الـ Empathic Assertion',story:'Agent اتعلم التوازن بين الـ Empathy والـ Assertion: "أنا فاهم إن ده محبطك جداً (Empathy)، وفي نفس الوقت اللي نقدر نعمله هو... (Assertion)".',moral:'الـ Empathy من غير حدود بتعمل promises فارغة. الـ Assertion من غير Empathy بيكون بارد. الاتنين مع بعض.',goal:'هدف اليوم: في محادثة صعبة، استخدم الـ Empathic Assertion.'},
{day:72,tag:'mindset',title:'مبدأ الـ Sustainable Pace',story:'في الـ Agile development، مبدأ Sustainable Pace بيقول إن الفريق لازم يشتغل بإيقاع يقدر يحافظ عليه للأجل البعيد. Sprint طويل بيكسر الناس. الـ agents اللي يشتغلوا بإيقاع مستدام بيفضلوا أطول وأفضل.',moral:'اشتغل بإيقاع تقدر تكمله مش بإيقاع تنهار منه.',goal:'هدف اليوم: قيّم إيقاعك في الشغل — هل تقدر تكمله 3 شهور؟'},
{day:73,tag:'performance',title:'مبدأ الـ Cross-Training',story:'Agent طلب يتدرب على قسم تاني لأسبوع. رجع بفهم أعمق لكيف القسم التاني بيشتغل وبدأ يشرح للكلاينتس بشكل أوضح ما كنوا بيسألوا عنه.',moral:'فهم الصورة الكبيرة بيخليك أفضل في الجزء اللي إنت فيه.',goal:'هدف اليوم: سأل عن قسم تاني في الشركة وافهم شغله — ولو بسؤال بسيط.'},
{day:74,tag:'communication',title:'مهارة الـ Strategic Silence',story:'Chris Voss، FBI negotiator، بيقول إن الصمت الاستراتيجي بيجبر الطرف التاني يملأ الفراغ بمعلومات. في البيع والحل، بعد عرضك للحل، صمت — الكلايت هيرد.',moral:'الصمت بعد الـ offer قوي جداً. اتعلم تستخدمه.',goal:'هدف اليوم: بعد أي عرض حل أو offer، صمت 3 ثواني قبل ما تكمل.'},
{day:75,tag:'mindset',title:'مبدأ الـ Contribution Over Recognition',story:'بحث على أكثر الناس رضا عن شغلهم لاقى إنهم بيهتموا أكثر بـ "إيه اللي قدموه" من "إيه اللي حصلوا عليه". التركيز على الـ Contribution بيخلق معنى حتى في الأيام الصعبة.',moral:'سأل نفسك: "إيه اللي قدمته النهارده؟" مش "إيه اللي واخده النهارده؟"',goal:'هدف اليوم: في نهاية يومك، حدد حاجة واحدة قدمتها لكلايت أو زميل بشكل حقيقي.'},
{day:76,tag:'performance',title:'مبدأ الـ Contextual Flexibility',story:'Agent ناجح مش بياخد نفس الأسلوب مع كل كلايت. كلايت قديم خبير = أسلوب مختلف عن كلايت جديد مش فاهم. تكييف الأسلوب حسب السياق مهارة راقية.',moral:'الـ One-size-fits-all مش بيشتغل مع الناس. كيّف نفسك.',goal:'هدف اليوم: حدد نوعين مختلفين من الكلاينتس واستخدم أسلوبين مختلفين معهم.'},
{day:77,tag:'communication',title:'مهارة الـ Confirming Understanding',story:'"فهمت صح إنك قصدك...؟" جملة بسيطة بتمنع 80% من سوء الفهم. Agent اتعلم يستخدمها بعد أي طلب معقد أو شكوى.',moral:'تأكيد الفهم مش ضعف — هو احترافية.',goal:'هدف اليوم: في كل طلب أو شكوى، استخدم "فهمت صح إنك..." قبل الرد.'},
{day:78,tag:'mindset',title:'مبدأ الـ Process vs Outcome',story:'المتحكم الوحيد هو العملية اللي بتعملها — مش دايماً النتيجة. البيع الكويس مش دايماً ينتهي بـ "نعم". الكلايت الزعلان مش دايماً بيبقى راضي حتى بعد حل مثالي. ركّز على اللي في إيدك.',moral:'كن منضبطاً في العملية وخلّي النتائج تجي.',goal:'هدف اليوم: حدد 3 أشياء في العملية بتاعتك أنت المسؤول عنهم 100%.'},
{day:79,tag:'performance',title:'مبدأ الـ Knowledge Transfer',story:'Agent شاطر بدأ يعمل ملاحظات للـ agents الجدد: "لما الكلايت يقول X، الأفضل تعمل Y". ده مش بس ساعد التيم — رسّخ المعلومة في دماغه هو.',moral:'الشرح للآخرين أفضل طريقة للتعلم.',goal:'هدف اليوم: شارك زميل جديد حاجة تعلمتها من تجربتك.'},
{day:80,tag:'communication',title:'مهارة الـ Positive Closure',story:'نهاية المكالمة بتترك أثر دائم. Agent اتعلم closure script قوية: يلخص الحل، يتأكد من الرضا، يشكر بصدق، ويعرض المساعدة المستقبلية. الـ CSAT ارتفع.',moral:'الكلمة الأخيرة بتبقى في ذاكرة الكلايت. اختارها بعناية.',goal:'هدف اليوم: صمم لنفسك closure مكالمة احترافي وجربه اليوم.'},
{day:81,tag:'mindset',title:'مبدأ الـ Self-Efficacy',story:'Albert Bandura أثبت إن إيمانك بقدرتك على النجاح هو أقوى تنبؤ بالنجاح الفعلي. مش الموهبة — الإيمان بالقدرة. الـ self-efficacy بتتبنى من التجارب الناجحة.',moral:'بنِ ملف نجاحاتك. كل نجاح صغير بيبني إيمانك بنفسك.',goal:'هدف اليوم: افتكر 5 مكالمات ناجحة وافتكر إحساسك فيهم.'},
{day:82,tag:'performance',title:'مبدأ الـ Adaptive Expertise',story:'الخبير المتكيف مش اللي اتعلم مهارة وكررها — هو اللي بيعدّل مهارته باستمرار حسب الظروف. الـ agent المحترف في 2025 مش زي المحترف في 2020 — العالم اتغير وهو اتغير معاه.',moral:'التكيف مع التغيير مش اختياري — هو مهارة أساسية.',goal:'هدف اليوم: فيه حاجة في طريقة شغلك لازم تتغير مع التغييرات الجديدة؟ ابدأ النهارده.'},
{day:83,tag:'communication',title:'مهارة الـ Graceful Exit',story:'لما المحادثة تمتد بدون هدف، agent اتعلم ينهيها بكياسة: "عشان أضمن إن كل حاجة اتحلت بشكل صح، هلخص ما اتفقنا عليه ونختم." الكلايت ما حسش بإنهاء مفاجئ.',moral:'انهاء المحادثة صح أهم من استمرارها بدون هدف.',goal:'هدف اليوم: تدرب على كيفية إنهاء محادثة مطوّلة بشكل محترم.'},
{day:84,tag:'mindset',title:'مبدأ الـ Excellence as Habit',story:'أرسطو قال: "نحن ما نكرره. التميز إذن ليس فعلاً، بل عادة." الـ excellence مش لحظة إلهام — هو مجموع الاختيارات الصغيرة كل يوم.',moral:'التميز عادة بتبنيها يوم بيوم، مش موهبة بتنتظرها.',goal:'هدف اليوم: حدد عادة مهنية واحدة لو عملتها كل يوم ستصبح متميزاً فيها.'},
{day:85,tag:'performance',title:'مبدأ الـ Multi-Channel Awareness',story:'الكلايت بيتفاعل مع الشركة من قنوات كتيرة. Agent اتعلم يسأل: "هل تواصلت معنا قبل كدا؟ على أي قناة؟" عشان يفهم الصورة كاملة ومش يكرر معلومات.',moral:'تاريخ الكلايت مهم. افهمه قبل ما تبدأ.',goal:'هدف اليوم: في كل مكالمة، اسأل عن تاريخ الكلايت مع الشركة لو مش واضح.'},
{day:86,tag:'communication',title:'مهارة الـ Emotional Labeling',story:'Chris Voss اكتشف إن تسمية مشاعر الكلايت بتخففها: "يبدو إنك محبط جداً من الموقف ده." الكلايت بيرد عادة: "آه، بالظبط." وبيبدأ يهدى.',moral:'تسمية المشاعر بتنزل حدتها. جرب وهتتفاجأ.',goal:'هدف اليوم: لما كلايت زعلان، حاول تسمّي مشاعره بدقة.'},
{day:87,tag:'mindset',title:'مبدأ الـ Stoic Daily Practice',story:'الرواقيون كانوا بيبدأوا يومهم بسؤال: "إيه التحديات اللي ممكن تواجهني النهارده وإزاي هتعامل معها؟" وبيختموا بـ: "إيه اللي عملته كويس وإيه اللي ممكن يتحسن؟"',moral:'البداية المقصودة والنهاية الواعية بتصنع يوم أفضل.',goal:'هدف اليوم: ابدأ يومك بسؤال عن التحديات المتوقعة واختمه بسؤال عن الدروس.'},
{day:88,tag:'performance',title:'مبدأ الـ Relationship Memory',story:'Agent بدأ يدوّن ملاحظات عن الكلاينتس المتكررين: اسم الطفل، المشروع اللي بيشتغل فيه، المشكلة اللي حلها الأسبوع اللي فات. لما الكلايت حس إنه متذكر، الولاء ارتفع.',moral:'الناس بتنسى ما قلته، بتنسى ما عملته، بس ما بتنساش إزاي خلّتهم يحسوا. سجّل وتذكر.',goal:'هدف اليوم: لكلايت متكرر، سجّل ملاحظة شخصية واحدة عنه.'},
{day:89,tag:'mindset',title:'مبدأ الـ Meaningful Contribution',story:'Viktor Frankl نجا من المحرقة لأنه وجد معنى. في الشغل اليومي، agent اللي بيحس إن شغله ليه معنى بيتحمل أكتر ويعطي أكتر. المعنى مش بيجي من الشغل — بيجي من إزاي بتشوفه.',moral:'إنت بتحدد معنى شغلك. اختار أن تراه بشكل مشرّف.',goal:'هدف اليوم: اكتب جملة تصف معنى شغلك بشكل شخصي وصادق.'},
{day:90,tag:'culture',title:'اليوم الـ 90 للـ Agent — إنت مختلف',story:'مسافر بدأ رحلة ورجع. المكان نفسه بس هو اتغير. إنت في اليوم 90 عندك 90 درساً، 90 تجربة، وأداة جديدة كل يوم. الفرق مش في الشهادات — في اللي اتبنى جوّاك.',moral:'90 يوم من التعلم المقصود بيبنوا شخص مختلف. احتفل بالتغيير.',goal:'هدف اليوم: شارك زميلك أهم 3 حاجات اتعلمتها في الـ 90 يوم.'},
],
hr:[
{day:1,tag:'hr',title:'أهمية الـ Onboarding الصح',story:'دراسة من SHRM لاقت إن الموظف اللي بياخد Onboarding احترافي بيبقى في الشركة بنسبة أعلى بـ 82% في السنة الأولى. لكن معظم الشركات بتديه ورقة وتقوله "اتعلم".',moral:'الـ Onboarding مش إجراء — هو رسالة: "إحنا مهتمين بك."',goal:'هدف النهارده: راجع تجربة الـ Onboarding في فريقك — هل هي محترمة؟'},
{day:2,tag:'hr',title:'فن الاحتفاظ بالموظفين',story:'Gallup بيقول إن 51% من الموظفين المستعدين للمغادرة بيقولوا إن مديرهم أو شركتهم كان ممكن يعمل حاجة تفرق. التكلفة الحقيقية لاستبدال موظف = 50-200% من راتبه السنوي.',moral:'الاحتفاظ بالموظف أرخص بكتير من توظيف بديل. الاستثمار في الناس يعود.',goal:'هدف اليوم: سأل واحد من تيمك: "إيه اللي بيخليك مكمل هنا؟" واسمع بجد.'},
{day:3,tag:'hr',title:'مبدأ الـ Job Fit vs Person Fit',story:'الـ HR الذكي بيفرق بين إن الشخص يناسب الوظيفة (Job Fit) وإن الشخص يناسب ثقافة الفريق (Person Fit). ممكن شخص يبقى شاطر جداً بس يكون misfit مع التيم ويدمّر الـ dynamics.',moral:'وظّف على الـ culture والـ values، ودرّب على الـ skills.',goal:'هدف اليوم: في التوظيف الجاي، حدد 3 قيم أساسية لازم الشخص يتوافق معها.'},
{day:4,tag:'hr',title:'أهمية الـ Stay Interviews',story:'معظم الشركات بتعمل Exit Interview — سؤال الشخص ليه بيمشي. Lori Bock طورت فكرة الـ Stay Interview: سؤال الشخص ليه بيفضل. النتايج مفاجأة وبتغير الـ retention strategy.',moral:'مستنيش حد يمشي تفهم ليه. اسأل دلوقتي ليه بيفضل.',goal:'هدف اليوم: اعمل Stay Interview مع حد في التيم: "إيه اللي بيخليك هنا؟ وإيه اللي لو اتغير كان هيفرق؟"'},
{day:5,tag:'hr',title:'مبدأ الـ Psychological Contract',story:'Denise Rousseau طورت مفهوم الـ Psychological Contract: التوقعات الضمنية اللي الموظف عنده من الشركة والعكس. لما الـ contract ده بيتكسر (ولو من غير قصد)، الثقة بتتهد.',moral:'وضّح التوقعات من أول يوم. الـ implicit ده اللي بيولد الخيبة.',goal:'هدف اليوم: فكر في حاجة تعتقدها ضمنية مع تيمك وصرّح بيها.'},
{day:6,tag:'hr',title:'الـ Performance Management الصح',story:'الـ Performance Review السنوية مات. الشركات الناجحة زي Google وAdobe اتجهت لـ Continuous Performance Management: feedback مستمر، check-ins منتظمة، وتطوير لحظي.',moral:'الـ annual review مجرد لقطة. الـ continuous feedback هو الفيلم كامل.',goal:'هدف اليوم: صمم نظام feedback بسيط يحصل أكثر من مرة في السنة.'},
{day:7,tag:'hr',title:'أهمية الـ Diversity في الفريق',story:'McKinsey دراسة على 1000+ شركة لاقت إن الشركات اللي عندها تنوع في القيادة بتحقق أرباح أعلى بـ 35% من المتوسط. التنوع مش فقط عدالة — هو ميزة تنافسية.',moral:'التنوع في الأفكار والخلفيات بيولد ابتكار. احتفل بالاختلاف.',goal:'هدف اليوم: في قرار جاي، دور على صوت مختلف ليس من المجموعة المعتادة.'},
{day:8,tag:'hr',title:'مبدأ الـ Learning Organization',story:'Peter Senge طور فكرة المنظمة المتعلمة: شركة بتعلم من نفسها بشكل مستمر. الشركات اللي بتستثمر في تعلم موظفيها بتكون أكثر adaptability في أوقات الأزمات.',moral:'الشركة اللي بتتعلم هي الشركة اللي بتبقى.',goal:'هدف اليوم: حدد ساعة أسبوعية للفريق للتعلم المشترك — ولو مقال أو فيديو.'},
{day:9,tag:'hr',title:'مبدأ الـ Employee Value Proposition',story:'EVP هو "ليه الشخص الشاطر هيجي يشتغل عندك؟" مش بس الراتب — الثقافة، الفرص، الـ purpose. الشركات اللي عندها EVP واضح بتجذب أحسن المواهب.',moral:'إيه اللي بيميز شغلك عند شركتك؟ الإجابة دي هي الـ EVP.',goal:'هدف اليوم: اكتب 3 جمل تصف ليه حد شاطر يجي يشتغل في تيمك.'},
{day:10,tag:'hr',title:'أهمية الـ Wellbeing في الشغل',story:'Harvard Business Review أثبت إن الموظفين اللي بيحسوا بـ Wellbeing عالي بيكونوا أكثر إنتاجاً بـ 31% وأكثر إبداعاً بـ 3 أضعاف وأقل غياباً بـ 37%.',moral:'الـ Wellbeing مش رفاهية — هو استثمار بيرجع بأرباح حقيقية.',goal:'هدف اليوم: سأل شخص في تيمك: "عامل إزيك حقيقي؟" وانتظر إجابة حقيقية.'},
{day:11,tag:'hr',title:'مبدأ الـ Talent Pipeline',story:'شركات زي GE كانت دايماً عندها خطة succession: كل مدير عنده بديل محتمل مجاهز. لما أي حد يمشي، مفيش disruption. ده مش بيصير من غير استثمار مسبق في التطوير.',moral:'التوظيف ردة فعل. الـ Talent Pipeline استباقي.',goal:'هدف اليوم: فكر: لو حد رئيسي في الفريق مشى بكره، فيه بديل محتمل؟'},
{day:12,tag:'hr',title:'الـ Compensation مش بس راتب',story:'Total Rewards Strategy بتقول إن الموظف بيقيّم حزمة كاملة: راتب + مزايا + بيئة + فرص تطوير + معنى. الشركات اللي بتعرض الـ package كامل بتكسب المنافسة على المواهب.',moral:'الراتب يجذب. الـ Total Rewards يحتفظ.',goal:'هدف اليوم: اعمل قائمة بكل ما بيقدمه تيمك للموظف خارج الراتب.'},
{day:13,tag:'hr',title:'مبدأ الـ Constructive Dismissal',story:'أحياناً الموظف ما بيطردش — الظروف بتتغير لحد ما هو بيقرر يمشي. Constructive Dismissal ده لما الشركة بتعمل بيئة بتضطر فيها الشخص يستقيل. ده مش بس أخلاقياً غلط — قانونياً محفوف بمخاطر.',moral:'راقب: هل الظروف في تيمك بتدفع الناس للمغادرة من غير ما نقول "اتفضل امشي"؟',goal:'هدف اليوم: قيّم: هل فيه حاجة في بيئة الشغل بتضغط على الناس بدون ضرورة؟'},
{day:14,tag:'hr',title:'أهمية الـ Manager Training',story:'Gallup أثبت إن 70% من Engagement الموظف بيتحدد بالمانجر المباشر. بس معظم الشركات بتحوّل أحسن technical person لمانجر من غير تدريب على الـ people management.',moral:'الترقية لإدارة الناس تحتاج مهارات مختلفة تماماً عن الترقية التقنية. درّب مانجريك.',goal:'هدف اليوم: حدد حاجة واحدة في الـ people management محتاجها أنت أو التيم ليدرز عندك.'},
{day:15,tag:'hr',title:'مبدأ الـ Fair Process',story:'في أي قرار بيأثر على الناس — ترقية، تغيير، إعادة هيكلة — الناس مش بس عايزة النتيجة العادلة، هي عايزة العملية تكون عادلة. لو الـ process شفاف وعادل، حتى لو النتيجة مش اللي اتمنوه، الناس بتقبلها.',moral:'الـ Fair Process يبني ثقة حتى في القرارات الصعبة.',goal:'هدف اليوم: في قرار جاي بيأثر على التيم، وضّح العملية قبل النتيجة.'},
{day:16,tag:'hr',title:'أهمية الـ Exit Interviews',story:'Exit Interview مش للتوثيق — للتعلم. لما الشخص بيمشي، بيكون عنده صدق مش بيقدر يقوله قبل كدا. الـ HR الذكي بيسمع ويحلل الـ patterns في ليه الناس بتمشي.',moral:'كل شخص بيمشي عنده درس. اسمعه.',goal:'هدف اليوم: راجع آخر 3 استقالات — هل فيه pattern مشترك؟'},
{day:17,tag:'hr',title:'مبدأ الـ Internal Mobility',story:'LinkedIn لاقى إن الموظفين في الشركات اللي بيسمحوا بـ Internal Mobility (انتقال بين أقسام) بيفضلوا ضعف الوقت من الباقيين. ناسهم بتلاقي فرصتهم جوّه بدل ما تدورها برّه.',moral:'قبل ما تبحث عن استقطاب خارجي، ابحث عن الطاقة الكامنة عندك.',goal:'هدف اليوم: فيه حد في التيم ممكن ينمو في مسار تاني داخل الفريق؟'},
{day:18,tag:'hr',title:'أهمية الـ Recognition Programs',story:'O.C. Tanner لاقى إن 79% من الموظفين اللي استقالوا ذكروا "نقص التقدير" كسبب رئيسي. Recognition مش بس جائزة — هي اعتراف بإنك شايف الشخص وجهده.',moral:'الاعتراف بالجهد بيكلف القليل ويعطي الكثير.',goal:'هدف اليوم: صمم طريقة بسيطة وثابتة لتقدير الجهد في تيمك.'},
{day:19,tag:'hr',title:'مبدأ الـ Inclusive Leadership',story:'Deloitte لاقى إن الفرق اللي بتحس بـ Inclusion بتكون أعلى أداءً بـ 80%. الـ Inclusive Leader بيتأكد إن كل صوت بيتسمع وكل فرد بيحس إنه ينتمي.',moral:'Inclusion مش شعار — ممارسات يومية بتخلي كل واحد يحس إنه جزء.',goal:'هدف اليوم: في الاجتماع الجاي، تأكد إن كل صوت اتسمع قبل ما تاخد القرار.'},
{day:20,tag:'hr',title:'أهمية الـ Psychological Safety في HR',story:'إيمي إيدموندسون أثبتت إن الـ Psychological Safety هو أهم عامل في أداء الفريق. وظيفة الـ HR أنها تبني وتحمي هذا الأمان في كل الـ policies والـ practices.',moral:'الـ HR مش بس موارد بشرية — هو حارس بيئة العمل.',goal:'هدف اليوم: قيّم: هل الـ HR policies بتاعتك بتدعم الـ Psychological Safety ولا بتعيقه؟'},
{day:21,tag:'hr',title:'مبدأ الـ Data-Driven HR',story:'People Analytics بقت من أهم مجالات الـ HR الحديث. بدل قرارات على الحدس، الشركات بتستخدم بيانات: من بيغيب أكتر؟ مين في خطر؟ إيه أنماط الـ turnover؟',moral:'القرارات الـ HR المبنية على بيانات أدق وأقل تأثراً بالـ bias.',goal:'هدف اليوم: حدد metric واحد تبدأ تتتبعه في تيمك.'},
{day:22,tag:'hr',title:'أهمية الـ Career Conversations',story:'LinkedIn لاقى إن الموظفين اللي عندهم career conversations منتظمة مع مديرهم أكثر engagement بـ 3 مرات. بس أقل من 20% من المديرين بيعملوها.',moral:'الحوار عن المستقبل المهني للموظف مسؤولية المانجر مش الموظف بس.',goal:'هدف اليوم: ابدأ career conversation مع واحد في التيم: "أنت عايز توصل فين؟"'},
{day:23,tag:'hr',title:'مبدأ الـ Job Crafting',story:'Amy Wrzesniewski أثبتت إن الموظفين اللي بيعيدوا تصميم شغلهم (Job Crafting) ليناسب نقاط قوتهم بيبقوا أكثر سعادة وإنتاجية. الـ HR الذكي بيدعم ده.',moral:'مش كل شخص في نفس الوظيفة بيشتغل بنفس الطريقة. وده ممكن يكون ميزة.',goal:'هدف اليوم: سأل شخص: "إيه الجزء من شغلك اللي بتحبه أكتر؟" وفكر كيف تضخّمه.'},
{day:24,tag:'hr',title:'أهمية الـ Mentorship Programs',story:'CNBC لاقى إن 91% من الموظفين اللي عندهم mentor بيكونوا أكثر رضا عن شغلهم. الـ Mentorship مش برامج رسمية بس — هو culture بيتبنى.',moral:'الـ Mentorship بيسرّع التطور ويبني ولاء. استثمر فيه.',goal:'هدف اليوم: حدد زوجاً واحداً mentor-mentee في تيمك وشجع العلاقة.'},
{day:25,tag:'hr',title:'مبدأ الـ Realistic Job Preview',story:'شركات لاقت إن لما بتوصف الوظيفة بصدق — الجيد والصعب — الناس اللي بتيجي بتبقى أكثر رضا وأقل دوران لأنهم ما فضلوش متفاجئين.',moral:'الإعلان الصادق عن الوظيفة يوفر وقت الكل.',goal:'هدف اليوم: راجع الـ job description للوظايف المفتوحة — هل هي صادقة عن التحديات؟'},
{day:26,tag:'hr',title:'أهمية الـ Conflict Resolution',story:'CPP Inc لاقى إن الموظف بيقضي 2.8 ساعة أسبوعياً في التعامل مع conflict. وإن 25% من المديرين بيقضوا أكثر من 9 ساعات. بدون مهارات conflict resolution، الطاقة بتتبدد.',moral:'Conflict مش مشكلة — إدارته الغلط هي المشكلة.',goal:'هدف اليوم: فيه conflict صغير في تيمك بتتجنبه؟ وقت تتعامل معه.'},
{day:27,tag:'hr',title:'مبدأ الـ Culture Add vs Culture Fit',story:'Culture Fit كان المعيار لزمان. Culture Add هو المعيار الأحدث: مش عايز حد زيك — عايز حد يضيف بُعد جديد لثقافتك. الفرق ده بيمنع الـ echo chambers.',moral:'وظّف من يثري ثقافتك لا من يعكسها فقط.',goal:'هدف اليوم: في التوظيف الجاي، سأل: "إيه الجديد اللي هيجيبه ده للفريق؟"'},
{day:28,tag:'hr',title:'أهمية الـ Feedback Culture',story:'Adobe وـ Microsoft لما حذفوا الـ Annual Review التقليدي واستبدلوه بـ Continuous Feedback، رأوا تحسناً واضحاً في الـ engagement والـ performance.',moral:'الـ Feedback المنتظم مش تعذيب — هو خارطة طريق للتطور.',goal:'هدف اليوم: ساعد في بناء ثقافة feedback بتبدأ بإنك تطلب feedback على نفسك.'},
{day:29,tag:'hr',title:'مبدأ الـ Employee Lifecycle',story:'كل موظف بيمر بـ lifecycle: Attract → Hire → Onboard → Develop → Retain → Exit. الـ HR الاستراتيجي بيصمم تجربة استثنائية في كل مرحلة.',moral:'كل مرحلة في حياة الموظف مهمة. مش بس التوظيف.',goal:'هدف اليوم: حدد أضعف مرحلة في الـ lifecycle عند فريقك وفكر في تحسينها.'},
{day:30,tag:'hr',title:'نهاية شهر HR — Big Picture',story:'Dave Ulrich، أب الـ HR الحديث، قال: "الـ HR موجود لأنه يخلق قيمة لأصحاب العمل والموظفين والعملاء." الـ HR الاستراتيجي مش ورق وإجراءات — هو architecture الإنسان في الشركة.',moral:'إنت مش بتدير ملفات — بتبني ناس وبتبني مستقبل.',goal:'هدف اليوم: اسأل نفسك: "إيه أكبر تأثير عملته على الناس في التيم ده الشهر الجاي؟"'},
],
};

const ALL_DATA = {
  tl: [...DATA.tl, ...DATA.tl2, ...DATA.tl3],
  ag: [...DATA.ag, ...DATA.ag2, ...DATA.ag3],
  hr: DATA.hr
};

let currentTab = 'tl';
let state = JSON.parse(localStorage.getItem('tracker_state') || '{}');

function saveState() { localStorage.setItem('tracker_state', JSON.stringify(state)); }

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  document.getElementById('tab-'+tab).classList.add('active-'+tab);
  renderCards();
}

function toggleCard(id) {
  const el = document.getElementById('story-'+id);
  if(el) el.classList.toggle('open');
}

function toggleDone(id, type, e) {
  e.stopPropagation();
  const key = type+'_'+id;
  if(state[key]) {
    delete state[key];
  } else {
    state[key] = new Date().toLocaleDateString('ar-EG',{day:'numeric',month:'short'});
  }
  saveState();
  updateStats();
  renderCards();
}

function updateStats() {
  const tlDone = ALL_DATA.tl.filter((_,i)=>state['tl_'+(i+1)]).length;
  const agDone = ALL_DATA.ag.filter((_,i)=>state['ag_'+(i+1)]).length;
  const hrDone = ALL_DATA.hr.filter((_,i)=>state['hr_'+(i+1)]).length;
  const total = tlDone + agDone + hrDone;
  const totalAll = ALL_DATA.tl.length + ALL_DATA.ag.length + ALL_DATA.hr.length;
  document.getElementById('s-done').textContent = total;
  document.getElementById('s-tl-done').textContent = tlDone;
  document.getElementById('s-ag-done').textContent = agDone;
  const pct = Math.round(total/totalAll*100);
  document.getElementById('pct-lbl').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
}

function renderCards() {
  const data = ALL_DATA[currentTab];
  const q = document.getElementById('search').value.trim().toLowerCase();
  const container = document.getElementById('cards-container');
  const typeLabel = currentTab === 'tl' ? 'TL' : currentTab === 'ag' ? 'AG' : 'HR';
  const typeClass = currentTab;

  let filtered = data.map((item, idx) => ({...item, idx})).filter(item =>
    !q || item.title.toLowerCase().includes(q) || item.story.toLowerCase().includes(q) || item.moral.toLowerCase().includes(q)
  );

  if(filtered.length === 0) {
    container.innerHTML = '<div class="empty">مفيش نتايج للبحث ده</div>';
    return;
  }

  let html = '';
  let lastWeek = -1;

  filtered.forEach(item => {
    const idx = item.idx;
    const dayNum = idx + 1;
    const week = Math.ceil(dayNum/7);
    const key = currentTab + '_' + dayNum;
    const done = !!state[key];
    const dateStr = state[key] || '';
    const cardId = currentTab + '_' + dayNum;

    if(!q && week !== lastWeek) {
      html += `<div class="week-label">الأسبوع ${week} — الأيام ${(week-1)*7+1} لـ ${Math.min(week*7, data.length)}</div>`;
      lastWeek = week;
    }

    html += `
    <div class="card ${done?'open':''}" onclick="toggleCard('${cardId}')">
      <div class="day-badge ${typeClass}">
        <span class="d-type">${typeLabel}</span>
        <span class="d-num">${dayNum}</span>
      </div>
      <div class="card-body">
        <div class="card-top">
          <span class="tag tag-${item.tag}">${item.tag}</span>
        </div>
        <h3>${item.title}</h3>
        <div class="story-wrap" id="story-${cardId}">
          <div class="story">
            ${item.story}
            <div class="moral ${typeClass}">📌 ${item.moral}</div>
            ${item.goal ? `<div class="goal-line">🎯 <span>${item.goal}</span></div>` : ''}
          </div>
        </div>
      </div>
      <div class="check-col">
        <button class="check-btn ${done?'checked':''}" onclick="toggleDone(${dayNum},'${currentTab}',event)">${done?'✓':'○'}</button>
        ${dateStr ? `<span class="date-lbl">${dateStr}</span>` : ''}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

updateStats();
renderCards();
</script>
</body>
</html>
